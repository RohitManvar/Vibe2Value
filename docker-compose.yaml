version: "3.9"
services: 
    db:
        image: pgvector/pgvector:pg16
        container_name: v2v-db
        restart: unless-stopped
        environment: 
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: v2v
        ports:
            - "5433:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
            
volumes:
    pgdata:
